services:
  - type: web
    name: spoorthi-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LOCAL_MODEL_NAME
        value: local-context
      - key: LOAD_REPO_KNOWLEDGE
        value: "true"
      - key: PERSIST_RUNTIME_KNOWLEDGE
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
