services:
  - type: web
    name: spoorthi-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: knowledge-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 5
    envVars:
      - key: LOCAL_MODEL_NAME
        value: local-context
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
